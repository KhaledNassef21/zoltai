name: Vercel Production Deploy

# Single source of truth for production deploys.
# Replaces the Vercel-GitHub auto-integration to guarantee domain aliases stay in sync.
# Flow: pull env -> build -> deploy -> alias (one atomic job).

on:
  push:
    branches: [main]
    # Don't deploy for changes that don't affect production build.
    # This prevents analytics / posted-log / docs-only commits from
    # burning deploy minutes and polluting history.
    paths-ignore:
      - "data/analytics.json"
      - "data/analytics-*.json"
      - "data/posted-*.json"
      - "data/subscribers.json"
      - "data/users.json"
      - "data/rate-limits.json"
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".vscode/**"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Prebuilt Artifacts to Vercel
        id: deploy
        shell: bash
        run: |
          # Disable errexit so we can ALWAYS print the Vercel CLI output
          # even when the deploy fails. Otherwise bash -eo pipefail exits
          # silently on non-zero from the command substitution below.
          set +e
          # --archive=tgz bundles the deployment into one upload instead of
          # thousands of individual file requests. This dodges the 5000/day
          # API upload cap on Vercel's free tier, which the old analytics
          # feedback loop had been burning through.
          RAW_OUTPUT=$(vercel deploy --prebuilt --prod --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          VERCEL_STATUS=$?
          echo "--- Vercel CLI exit=$VERCEL_STATUS ---"
          echo "$RAW_OUTPUT"
          echo "---------------------------------------"
          if [ "$VERCEL_STATUS" -ne 0 ]; then
            echo "❌ vercel deploy exited $VERCEL_STATUS — see output above"
            exit "$VERCEL_STATUS"
          fi
          # Extract the first .vercel.app URL from the CLI output.
          DEPLOY_URL=$(echo "$RAW_OUTPUT" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | head -n 1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Could not extract deployment URL from Vercel CLI output"
            exit 1
          fi
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed: $DEPLOY_URL"

      - name: Assign Domain Aliases
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          echo "Aliasing $DEPLOY_URL -> zoltai.org + www.zoltai.org..."
          vercel alias set "$DEPLOY_URL" zoltai.org \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
          vercel alias set "$DEPLOY_URL" www.zoltai.org \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}
          echo "✅ zoltai.org + www.zoltai.org -> $DEPLOY_URL"
