name: Generate Daily Article

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:  # ✅ يسمح بالتشغيل اليدوي للتجربة

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      # ✅ يجب أن تكون MOCK_MODE هنا، داخل job > env
      MOCK_MODE: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      # ... باقي المتغيرات
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        run: npx tsx scripts/generate-article.ts
