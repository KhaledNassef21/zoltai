# .github/workflows/generate-article.yml
jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      # ✅ OpenAI (مُفعّل مؤقتاً)
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: "gpt-4o-mini"  # رخيص وسريع (~$0.15/1M tokens)
      
      # ❌ Anthropic (معطل مؤقتاً - لا تحذفه، فقط لن يُستخدم)
      # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      
      # ... باقي المتغيرات
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate article
        run: npx tsx scripts/generate-article.ts
