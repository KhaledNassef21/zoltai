name: Daily SEO Optimization

on:
  schedule:
    - cron: "0 3 * * *" # Every day at 3:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Optimize articles for SEO
        run: npx tsx scripts/optimize-seo.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit SEO improvements
        run: |
          git config user.name "Zoltai Bot"
          git config user.email "bot@zoltai.ai"
          git add src/content/blog/
          git diff --staged --quiet || (git commit -m "seo: optimize articles $(date +%Y-%m-%d)" && git push)
