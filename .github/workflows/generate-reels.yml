name: Generate Reels Scripts

on:
  # Run after daily article generation (6AM + 1hr buffer)
  schedule:
    - cron: "0 7 * * *" # Every day at 7:00 AM UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Generate Reel Scripts
        run: npx tsx scripts/generate-reels.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit reels data
        run: |
          git config user.name "zoltai-bot"
          git config user.email "bot@zoltai.org"
          git add data/reels/ || true
          git diff --staged --quiet || git commit -m "chore: generate reel scripts for new articles"
          git push || true
