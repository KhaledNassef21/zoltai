name: Weekly Email Report

on:
  schedule:
    - cron: "0 9 * * 0" # Every Sunday at 9:00 AM UTC
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Send weekly report
        run: npx tsx scripts/weekly-report.ts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: "Zoltai <onboarding@resend.dev>"
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          GSC_CLIENT_EMAIL: ${{ secrets.GSC_CLIENT_EMAIL }}
          GSC_PRIVATE_KEY: ${{ secrets.GSC_PRIVATE_KEY }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
