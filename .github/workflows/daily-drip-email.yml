name: Daily Drip Email Campaign

on:
  schedule:
    - cron: "0 8 * * *" # Every day at 8:00 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run drip campaign
        run: npx tsx scripts/email-drip.ts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: "Zoltai <noreply@zoltai.org>"
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID }}

      - name: Commit subscriber updates
        run: |
          git config user.name "Zoltai Bot"
          git config user.email "bot@zoltai.org"
          git add data/subscribers.json 2>/dev/null || true
          git diff --staged --quiet || (git commit -m "chore: update drip email tracking $(date +%Y-%m-%d)" && git push)
