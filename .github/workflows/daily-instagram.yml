name: Daily Instagram + Facebook Post

on:
  schedule:
    - cron: "0 12 * * *" # Every day at 12:00 PM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Post to Instagram + Facebook
        run: npx tsx scripts/post-instagram.ts
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          IMAGE_PROVIDER: ${{ secrets.IMAGE_PROVIDER }}

      - name: Save post log (prevent duplicate posts)
        run: |
          git config user.name "zoltai-bot"
          git config user.email "bot@zoltai.org"
          git add data/posted-slugs.json || true
          git diff --staged --quiet || git commit -m "chore: update posted slugs log"
          git pull --rebase || true
          git push || true
